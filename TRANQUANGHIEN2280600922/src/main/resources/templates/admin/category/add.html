<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm Thể Loại Mới</title>
</head>
<body>
<section layout:fragment="content" class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h3 class="card-title mb-0"><i class="bi bi-plus-circle"></i> Thêm Thể Loại</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/categories/add}" th:object="${category}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Tên thể loại</label>
                            <input type="text" th:field="*{name}" class="form-control" id="name" 
                                   placeholder="Nhập tên thể loại mới..." required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="/admin/categories" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Lưu lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
