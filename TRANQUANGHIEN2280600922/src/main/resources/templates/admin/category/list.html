<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Quản Lý Thể Loại</title></head>
<body>
<section layout:fragment="content" class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-tags"></i> Quản Lý Thể Loại</h2>
        <a th:href="@{/admin/categories/add}" class="btn btn-success"><i class="bi bi-plus-circle"></i> Thêm mới</a>
    </div>

    <table class="table table-bordered table-hover shadow-sm bg-white">
        <thead class="table-primary">
            <tr>
                <th>Tên Thể Loại</th>
                <th class="text-center">Số lượng sách (Đang bán)</th>
                <th class="text-center">Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.name}" class="fw-bold text-dark"></td>
                <td class="text-center">
                    <span class="badge bg-info text-dark" th:text="${@categoryService.countActiveBooks(cat.id)}"></span>
                </td>
                <td class="text-center">
                    <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn btn-warning btn-sm">Sửa</a>
                    <a th:if="${cat.name != 'Chưa biết'}" 
                       th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('Bạn có chắc muốn xóa? Sách sẽ chuyển về mục [Chưa biết].')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</section>
</body>
</html>
