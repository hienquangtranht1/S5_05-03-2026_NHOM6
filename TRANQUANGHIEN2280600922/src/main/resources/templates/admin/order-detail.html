<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Chi tiết hóa đơn</title>
</head>
<body>
<section layout:fragment="content" class="container mt-5 mb-5">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
            <h4 class="mb-0 text-uppercase ls-1">Hóa Đơn #<span th:text="${order.id}"></span></h4>
            <div>
                <span class="badge bg-warning text-dark" th:if="${order.status == 'UNPAID'}">CHƯA THANH TOÁN</span>
                <span class="badge bg-success" th:if="${order.status == 'PAID'}">ĐÃ THANH TOÁN</span>
                <span class="badge bg-primary" th:if="${order.status == 'DELIVERED'}">ĐÃ GIAO HÀNG</span>
                <span class="badge bg-danger" th:if="${order.status == 'CANCELLED'}">ĐÃ HỦY</span>
            </div>
        </div>

        <div class="card-body p-4">
            <div class="row mb-4">
                <div class="col-md-6 border-end">
                    <h5 class="text-primary text-uppercase mb-3"><i class="bi bi-person-circle"></i> Người Nhận</h5>
                    <ul class="list-unstyled">
                        <li class="mb-2"><strong>Họ tên:</strong> <span th:text="${order.user.fullName != null ? order.user.fullName : order.user.username}"></span></li>
                        <li class="mb-2"><strong>Điện thoại:</strong> <span th:text="${order.phoneNumber}"></span></li>
                        <li class="mb-2"><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}"></span></li>
                        <li class="mb-2"><strong>Email:</strong> <span th:text="${order.user.email}"></span></li>
                    </ul>
                </div>

                <div class="col-md-6 ps-md-4">
                    <h5 class="text-primary text-uppercase mb-3"><i class="bi bi-receipt"></i> Thông Tin Đơn</h5>
                    <ul class="list-unstyled">
                        <li class="mb-2"><strong>Mã đơn hàng:</strong> #<span th:text="${order.id}"></span></li>
                        <li class="mb-2"><strong>Phương thức TT:</strong> <span th:text="${order.paymentMethod}" class="fw-bold"></span></li>
                        </ul>
                </div>
            </div>

            <h5 class="mb-3 text-secondary mt-4">Chi Tiết Sản Phẩm</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-secondary text-center">
                        <tr>
                            <th style="width: 5%">STT</th>
                            <th style="width: 45%">Tên Sách</th>
                            <th style="width: 15%">Đơn Giá</th>
                            <th style="width: 10%">SL</th>
                            <th style="width: 25%">Thành Tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="detail, stat : ${order.orderDetails}">
                            <td class="text-center" th:text="${stat.count}"></td>
                            <td th:text="${detail.book.title}" class="fw-bold text-dark"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td class="text-center" th:text="${detail.quantity}"></td>
                            <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        </tr>
                    </tbody>
                    <tfoot class="bg-light">
                        <tr>
                            <td colspan="4" class="text-end fw-bold text-uppercase pt-3">Tổng cộng:</td>
                            <td class="text-end text-danger fw-bold fs-5 pt-3">
                                <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-4 d-flex justify-content-between align-items-center">
                <a href="/admin/orders" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Quay lại danh sách
                </a>
                
                <div class="d-flex gap-2">
                    <form th:if="${order.status == 'UNPAID'}" 
                          th:action="@{/admin/orders/cancel/{id}(id=${order.id})}" method="post">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Xác nhận hủy đơn hàng này?');">
                            <i class="bi bi-x-circle"></i> Hủy Đơn
                        </button>
                    </form>

                    <form th:if="${order.status == 'PAID' or (order.status == 'UNPAID' and order.paymentMethod == 'COD')}" 
                          th:action="@{/admin/orders/confirm-delivery/{id}(id=${order.id})}" method="post">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-truck"></i> Xác Nhận Giao Hàng
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
