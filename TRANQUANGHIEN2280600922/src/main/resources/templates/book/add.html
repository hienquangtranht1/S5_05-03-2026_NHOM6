<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm Sách Mới</title>
</head>
<body>
<section layout:fragment="content" class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7"> <div class="card shadow-lg border-0 rounded-4"> <div class="card-header bg-primary bg-gradient text-white py-3 rounded-top-4">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-journal-plus me-2"></i>Thêm Sách Mới</h4>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/books/add}" th:object="${book}" method="post" enctype="multipart/form-data">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên Sách <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-book"></i></span>
                                <input type="text" th:field="*{title}" class="form-control" placeholder="Nhập tên sách..." required
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tác Giả <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-lines-fill"></i></span>
                                <input type="text" th:field="*{author}" class="form-control" placeholder="Nhập tên tác giả..." required
                                       th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Danh Mục <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-tags"></i></span>
                                <select th:field="*{category.id}" class="form-select" required th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                    <option value="" selected disabled>-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Giá Tiền</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-cash-coin"></i></span>
                                    <input type="number" th:field="*{price}" class="form-control" min="0" step="1000" placeholder="0">
                                    <span class="input-group-text fw-bold">VNĐ</span>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Số Lượng</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-box-seam"></i></span>
                                    <input type="number" th:field="*{quantity}" class="form-control" min="1" value="1">
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô Tả Sách</label>
                            <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Nhập tóm tắt nội dung sách..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Hình Ảnh Bìa</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-image"></i></span>
                                <input type="file" name="imageFile" class="form-control" accept="image/*" id="coverImage" onchange="previewImage(event)">
                            </div>
                            <div class="mt-3 text-center">
                                <img id="imagePreview" src="#" alt="Ảnh xem trước" class="img-thumbnail d-none shadow-sm" style="max-height: 250px; object-fit: cover;">
                            </div>
                        </div>

                        <hr class="text-muted">

                        <div class="d-flex gap-2 justify-content-end mt-4">
                            <a th:href="@{/books}" class="btn btn-light border">
                                <i class="bi bi-x-circle"></i> Hủy Bỏ
                            </a>
                            <button type="submit" class="btn btn-primary px-4 fw-bold">
                                <i class="bi bi-cloud-arrow-up"></i> Lưu Sách
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="scripts">
    <script>
        function previewImage(event) {
            const reader = new FileReader();
            const imageField = document.getElementById("imagePreview");
            
            reader.onload = function(){
                if(reader.readyState === 2){
                    imageField.src = reader.result;
                    imageField.classList.remove("d-none"); // Hiển thị thẻ img
                }
            }
            
            if(event.target.files[0]){
                reader.readAsDataURL(event.target.files[0]);
            } else {
                // Ẩn đi nếu người dùng hủy chọn file
                imageField.src = "#";
                imageField.classList.add("d-none");
            }
        }
    </script>
</th:block>

</body>
</html>
