<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Chi Tiết Sách</title>
</head>
<body>
<section layout:fragment="content" class="container mt-5 mb-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/books">Trang chủ</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${book.title}"></li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-md-5">
            <img th:src="${book.image != null ? '/images/' + book.image : 'https://placehold.co/400x600'}" 
                 class="img-fluid rounded shadow-sm w-100" alt="Book Image">
        </div>

        <div class="col-md-7">
            <h2 class="fw-bold text-primary" th:text="${book.title}">Tên sách</h2>
            <p class="text-muted">Tác giả: <span class="fw-bold text-dark" th:text="${book.author}"></span></p>
            <p class="text-muted">Danh mục: <span class="badge bg-info text-dark" th:text="${book.category.name}"></span></p>
            
            <h3 class="text-danger fw-bold my-3" th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h3>
            
            <div class="mb-4">
                <h5>Tình trạng:</h5>
                <span th:if="${book.quantity > 0}" class="badge bg-success">Còn hàng (SL: <span th:text="${book.quantity}"></span>)</span>
                <span th:if="${book.quantity <= 0}" class="badge bg-danger">HẾT HÀNG</span>
            </div>

            <p class="lead">Mô tả sản phẩm: Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sách hay, giấy đẹp, nội dung hấp dẫn.</p>

            <div class="d-flex gap-3 mt-4">
                <a th:if="${book.quantity > 0}" th:href="@{/cart/add/{id}(id=${book.id})}" class="btn btn-primary btn-lg px-5">
                    <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                </a>
                <button th:if="${book.quantity <= 0}" class="btn btn-secondary btn-lg px-5" disabled>Hết Hàng</button>
                
                <a href="/books" class="btn btn-outline-secondary btn-lg">Quay lại</a>
            </div>
        </div>
    </div>
</section>
</body>
</html>
