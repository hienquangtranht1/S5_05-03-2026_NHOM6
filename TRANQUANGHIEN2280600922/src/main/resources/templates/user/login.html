<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Đăng nhập - Bookstore</title>
</head>
<body>
<section layout:fragment="content" class="py-5">
    <div class="container h-100">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-12 col-lg-6 col-md-8 col-xl-5">
                <div class="card shadow" style="border-radius: 1rem;">
                    <div class="card-body p-5 text-center">
                        <h3 class="mb-3">Đăng nhập <strong>Bookstore</strong></h3>
                        <p class="mb-4 text-secondary">Nhập thông tin tài khoản để truy cập.</p>
                        
                        <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100 mb-3">
                            <i class="bi bi-google"></i> Login with Google
                        </a>
                        
                        <div class="d-flex align-items-center mb-3">
                            <hr class="flex-grow-1">
                            <span class="mx-2 text-muted small">OR</span>
                            <hr class="flex-grow-1">
                        </div>
                        
                        <form th:action="@{/login}" method="post">
                            <div th:if="${param.error}" class="alert alert-danger small text-start">
                                <i class="bi bi-exclamation-circle"></i> Sai tên đăng nhập hoặc mật khẩu.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-success small text-start">
                                <i class="bi bi-check-circle"></i> Bạn đã đăng xuất thành công.
                            </div>

                            <div class="form-floating mb-3 text-start">
                                <input type="text" class="form-control" required id="username" name="username" placeholder="Username">
                                <label for="username">Tên đăng nhập</label>
                            </div>

                            <div class="form-floating mb-3 text-start">
                                <input type="password" class="form-control" required id="password" name="password" placeholder="Password">
                                <label for="password">Mật khẩu</label>
                            </div>

                            <div class="form-check d-flex justify-content-start mb-4">
                                <input type="checkbox" class="form-check-input" name="remember-me" id="remember-me">
                                <label class="form-check-label ms-2" for="remember-me"> Ghi nhớ đăng nhập</label>
                            </div>

                            <div class="d-grid gap-2 form-action">
                                <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
                                <p class="mt-3 mb-0 text-muted">Chưa có tài khoản? 
                                    <a class="text-primary fw-bold text-decoration-none" th:href="@{/register}">Đăng ký ngay</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
