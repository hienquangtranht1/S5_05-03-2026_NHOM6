<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore App</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }
        main { flex: 1; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .nav-link { font-weight: 500; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: auto; }
        .admin-nav { background-color: #f1f3f5; border-bottom: 2px solid #dee2e6; }
    </style>
</head>
<body>

    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="/books"><i class="bi bi-book-half"></i> BookStore</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="/books">Trang Chủ</a>
                        </li>
                        
                        <li class="nav-item dropdown" sec:authorize="hasAuthority('ADMIN')">
                            <a class="nav-link dropdown-toggle text-warning fw-bold" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-shield-lock"></i> Quản Trị Hệ Thống
                            </a>
                            <ul class="dropdown-menu shadow">
                                <li><a class="dropdown-item" href="/books/management"><i class="bi bi-journal-text"></i> Quản Lý Sách</a></li>
                                <li><a class="dropdown-item" href="/admin/categories"><i class="bi bi-tags"></i> Quản Lý Thể Loại</a></li>
                                <li><a class="dropdown-item" href="/admin/orders"><i class="bi bi-truck"></i> Quản Lý Đơn Hàng</a></li>
                            </ul>
                        </li>
                    </ul>
                    
                    <ul class="navbar-nav align-items-center">
                        <li class="nav-item me-3">
                            <a class="nav-link position-relative btn btn-outline-light border-0" href="/cart">
                                <i class="bi bi-cart-fill fs-5"></i> Giỏ hàng
                                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" style="width: 10px; height: 10px;"></span>
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="!isAuthenticated()">
                            <a class="btn btn-light text-primary fw-bold btn-sm me-2" href="/login">Đăng Nhập</a>
                            <a class="btn btn-outline-light btn-sm" href="/register">Đăng Ký</a>
                        </li>

                        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                            <a class="nav-link dropdown-toggle text-white fw-bold" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i> <span sec:authentication="name">User</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow">
                                <li><a class="dropdown-item" href="/user/orders"><i class="bi bi-receipt"></i> Đơn mua của tôi</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{/logout}" method="post">
                                        <button class="dropdown-item text-danger" type="submit"><i class="bi bi-box-arrow-right"></i> Đăng Xuất</button>
                                    </form>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main layout:fragment="content">
        </main>

    <footer th:fragment="footer">
        <div class="container text-center">
            <p class="mb-1">&copy; 2024 Hutech Bookstore. All rights reserved.</p>
            <small class="text-muted">Designed by Group 6 - Hệ thống quản lý sách nâng cao</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const successParam = urlParams.get('success');
            const errorParam = urlParams.get('error');

            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3500,
                timerProgressBar: true,
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });

            if (successParam) {
                let msg = "Thao tác thành công!";
                // Custom messages
                switch(successParam) {
                    case 'added_to_cart': msg = "Đã thêm vào giỏ hàng!"; break;
                    case 'order_placed': msg = "Đặt hàng thành công!"; break;
                    case 'payment_successful': msg = "Thanh toán thành công!"; break;
                    case 'Added': msg = "Thêm mới thành công!"; break;
                    case 'Updated': msg = "Cập nhật dữ liệu thành công!"; break;
                    case 'Deleted': msg = "Đã xóa dữ liệu thành công!"; break;
                }
                
                Toast.fire({ icon: 'success', title: msg });
                window.history.replaceState(null, null, window.location.pathname);
            }

            if (errorParam) {
                let errorMsg = errorParam;
                // Giải mã lỗi từ URL
                if(errorParam === 'NotFound') errorMsg = "Không tìm thấy dữ liệu yêu cầu!";
                
                Toast.fire({ icon: 'error', title: "Lỗi: " + errorMsg });
                window.history.replaceState(null, null, window.location.pathname);
            }
        });
    </script>
</body>
</html>
